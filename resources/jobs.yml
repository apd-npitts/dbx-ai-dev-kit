resources:
  jobs:
    demo_orchestration_job:
      name: "[${bundle.target}] Genie Codex Demo Orchestration"
      tasks:
        - task_key: seed_demo_data
          notebook_task:
            notebook_path: ../src/notebooks/01_seed_demo_data.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume_name: ${var.volume_name}
        - task_key: refresh_pipeline
          depends_on:
            - task_key: seed_demo_data
          pipeline_task:
            pipeline_id: ${resources.pipelines.genie_demo_pipeline.id}
        - task_key: validate_outputs
          depends_on:
            - task_key: refresh_pipeline
          notebook_task:
            notebook_path: ../src/notebooks/02_validate_demo_outputs.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
      queue:
        enabled: true
      permissions:
        - level: CAN_MANAGE_RUN
          group_name: users
