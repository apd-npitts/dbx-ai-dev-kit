bundle:
  name: genie-codex-demo

include:
  - resources/*.yml

variables:
  catalog:
    default: main
  schema:
    default: genie_codex_demo
  volume_name:
    default: demo_assets
  warehouse_id:
    default: REPLACE_WITH_SQL_WAREHOUSE_ID
  notification_email:
    default: ""

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: DEFAULT
    permissions:
      - level: CAN_MANAGE
        user_name: ${workspace.current_user.userName}
  prod:
    mode: production
    workspace:
      profile: DEFAULT
